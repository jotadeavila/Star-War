services:
  api:
    build: .
    container_name: starwars_api
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings
      - DB_NAME=starwars_db
      - DB_USER=starwars_user
      - DB_PASSWORD=starwars_pass
      - DB_HOST=db
      - DB_PORT=3306
    depends_on:
      - db
    volumes:
      - .:/app
    command: >
      sh -c "python manage.py migrate &&
             python manage.py load_data &&
             python manage.py runserver 0.0.0.0:8000"

  db:
    image: mysql:8.0
    container_name: starwars_mysql
    restart: always
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: starwars_db
      MYSQL_USER: starwars_user
      MYSQL_PASSWORD: starwars_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  adminer:
    image: adminer
    container_name: starwars_adminer
    restart: always
    ports:
      - "8090:8080"

volumes:
  mysql_data: